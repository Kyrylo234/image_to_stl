name: Auto-deploy image_to_stl to Oracle Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.1
      with:
        ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

    - name: Sync code to Oracle VM
      run: |
        rsync -avz -e "ssh -o StrictHostKeyChecking=no" --delete ./ ubuntu@145.241.217.10:~/image_to_stl/

    - name: Install Python dependencies
      run: |
        ssh -o StrictHostKeyChecking=no ubuntu@145.241.217.10 << 'EOF'
          cd ~/image_to_stl
          python3 -m venv venv || true
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
        EOF

    - name: Run STL generator
      run: |
        ssh -o StrictHostKeyChecking=no ubuntu@145.241.217.10 << 'EOF'
          cd ~/image_to_stl
          source venv/bin/activate
          python image_to_stl.py input.jpg output.stl 10
        EOF
